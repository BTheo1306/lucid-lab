<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1128" height="191" viewBox="0 0 1128 191" role="img" aria-labelledby="title desc">
  <title id="title"></title>
  <desc id="desc"></desc>
  
  <rect width="1128" height="191" fill="#0A0A0A"/>
  
  <!-- Grille subtile -->
  <pattern id="gridPattern" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  </pattern>
  <rect width="1128" height="191" fill="url(#gridPattern)" />

  <!-- Diagramme d'architecture à Droite -->
  <g transform="translate(680, 20)">
    <!-- Noeuds principaux -->
    <rect x="50" y="30" width="80" height="40" rx="6" fill="#1C1C1C" stroke="#333" stroke-width="1.5"/>
    <text x="90" y="55" fill="#facc15" font-family="Syne, Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Input</text>
    
    <path d="M 130 50 L 170 50" stroke="#facc15" stroke-width="1.5" stroke-dasharray="2,2"/>
    <circle cx="150" cy="50" r="3" fill="#facc15"/>
    
    <rect x="170" y="20" width="100" height="60" rx="6" fill="#1C1C1C" stroke="#facc15" stroke-width="1.5"/>
    <text x="220" y="47" fill="#fff" font-family="Figtree, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Agent AI</text>
    <text x="220" y="63" fill="#888" font-family="Figtree, sans-serif" font-size="9" text-anchor="middle">GPT-4o</text>
    
    <path d="M 270 50 L 310 50" stroke="#333" stroke-width="1.5"/>
    
    <!-- Sorties multiples -->
    <path d="M 310 50 L 310 20 L 330 20" fill="none" stroke="#444" stroke-width="1.5"/>
    <rect x="330" y="0" width="80" height="40" rx="6" fill="#1C1C1C" stroke="#333" stroke-width="1.5"/>
    <text x="370" y="25" fill="#aaa" font-family="Figtree, sans-serif" font-size="11" text-anchor="middle">Supabase</text>

    <path d="M 310 50 L 310 80 L 330 80" fill="none" stroke="#444" stroke-width="1.5"/>
    <rect x="330" y="60" width="80" height="40" rx="6" fill="#1C1C1C" stroke="#333" stroke-width="1.5"/>
    <text x="370" y="85" fill="#aaa" font-family="Figtree, sans-serif" font-size="11" text-anchor="middle">Outreach</text>
    <circle cx="220" cy="50" r="60" fill="url(#glowObj2)" opacity="0.3"/>
  </g>
  
  <!-- Textes à gauche (Eviter la zone bas-gauche pour l'avatar) -->
  <g transform="translate(430, 75)">
    <text x="0" y="0" fill="#ffffff" font-family="Syne, Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="-0.5">Automatisations &amp; Agents IA</text>
    <text x="0" y="30" fill="#a0a0a0" font-family="Figtree, Arial, sans-serif" font-size="18" font-weight="400">Transformez vos processus manuels en systèmes scalables.</text>
    <!-- Badge -->
    <rect x="0" y="55" width="220" height="30" rx="15" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
    <text x="25" y="75" fill="#ccc" font-family="Figtree, Arial, sans-serif" font-size="12" font-weight="600">Lucid OS Stack : Next.js • Supabase</text>
    <circle cx="12" cy="70" r="3" fill="#facc15"/>
  </g>
  <defs>
    <radialGradient id="glowObj2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#facc15" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#facc15" stop-opacity="0" />
    </radialGradient>
  </defs>
</svg>
