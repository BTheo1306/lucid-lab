  # ---------- TECH STACK ----------
  - category: tech_stack
    topic: Stack technique
    language: fr
    content: |
      Langages : TypeScript, Python. Frontend : Next.js, React, Tailwind. Backend :
      Node.js, Python (FastAPI). Bases : Postgres, Supabase, Redis. Infra : Vercel,
      Cloudflare, AWS, GCP. IA : Anthropic, OpenAI, Google, Mistral, modèles open-source
      (Llama, Mistral self-hosted). Observabilité : Sentry, Datadog, OpenTelemetry.
      Tests : Vitest, Pytest, Playwright.

  - category: tech_stack
    topic: Technical stack
    language: en
    content: |
      Languages: TypeScript, Python. Frontend: Next.js, React, Tailwind. Backend: Node.js,
      Python (FastAPI). Databases: Postgres, Supabase, Redis. Infra: Vercel, Cloudflare,
      AWS, GCP. AI: Anthropic, OpenAI, Google, Mistral, open-source (Llama, self-hosted
      Mistral). Observability: Sentry, Datadog, OpenTelemetry. Testing: Vitest, Pytest,
      Playwright.
